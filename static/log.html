<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Interaction Log</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #f6f8fa; 
            color: #24292f;
        }
        h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.5em; }
        
        .header-meta {
            background: white;
            padding: 15px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9em;
        }
        .meta-item { display: flex; flex-direction: column; }
        .meta-label { font-weight: bold; color: #57606a; font-size: 0.8em; margin-bottom: 2px; }

        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user { justify-content: flex-start; }
        .message-row.model { justify-content: flex-end; }
        .message-row.tool { justify-content: center; }

        .message-bubble {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 6px;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            overflow-wrap: break-word;
            min-width: 300px;
        }

        .user .message-bubble {
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-left: 4px solid #0969da;
        }

        .model .message-bubble {
            background-color: #f1f8ff; /* Light blue tint */
            border: 1px solid #c8e1ff;
            border-right: 4px solid #0969da;
        }

        .tool .message-bubble {
            background-color: #fff8c5; /* Light yellow/warning for tool calls */
            border: 1px solid #d0d7de;
            border-top: 4px solid #9a6700; 
            max-width: 95%;
            font-size: 0.9em;
        }

        /* Differentiate Function Response from Function Call visually if possible, 
           but they are often in the same 'function' role or mixed. 
           Let's handle inside the content rendering. */

        .role-badge {
            font-size: 0.75em;
            font-weight: bold;
            color: #57606a;
            margin-bottom: 5px;
            text-transform: uppercase;
            display: block;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        
        .content-block {
            white-space: pre-wrap;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        
        .text-part {
            margin-bottom: 10px;
        }

        /* Collapsible formatting */
        .collapsible {
            border: 1px solid #d0d7de;
            border-radius: 4px;
            margin-top: 5px;
            background: white;
            overflow: hidden;
        }
        .collapsible-header {
            background: #f6f8fa;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            color: #0969da;
        }
        .collapsible-header:hover { background: #eef1f4; text-decoration: underline; }
        .collapsible-content {
            padding: 10px;
            display: none;
            overflow-x: auto;
            border-top: 1px solid #d0d7de;
            background-color: #fff;
        }
        .collapsible.open .collapsible-content { display: block; }
        .collapsible.open .arrow::after { content: '▼'; }
        .arrow::after { content: '▶'; font-size: 0.8em; margin-left: 5px; }

        pre { margin: 0; }
        code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }

        /* Function Call Styling */
        .fn-call-box {
            background: #fffbdd;
            border: 1px solid #e3d06f;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 10px;
        }
        .fn-resp-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 10px;
        }
        
        .fn-name { font-weight: bold; font-family: monospace; font-size: 1.1em; display: inline-block; margin-bottom: 5px; }
        .fn-call-box .fn-name { color: #d9534f; } /* Reddish for call */
        .fn-resp-box .fn-name { color: #15803d; } /* Greenish for response */

        a { color: #0969da; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .back-link { display: inline-block; margin-bottom: 15px; }
        
        .truncated-hint {
            color: #666;
            font-style: italic;
            font-size: 0.85em;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-link">← Back</a>
    <h1>LLM Interaction Log</h1>
    <div id="meta" class="header-meta">Loading metadata...</div>
    <div id="chat" class="chat-container">
        <div style="text-align: center; padding: 20px; color: #555;">Loading conversation...</div>
    </div>

    <script>
        async function fetchLog() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('chat').innerHTML = 'No Review ID provided.';
                return;
            }

            try {
                const res = await fetch(`/api/review?id=${id}`);
                if (!res.ok) throw new Error(res.statusText);
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('chat').innerHTML = `Error loading log: ${e.message}`;
            }
        }

        function render(data) {
            // Render Meta
            const date = new Date(data.created_at * 1000).toLocaleString();
            document.getElementById('meta').innerHTML = `
                <div class="meta-item"><span class="meta-label">ID</span><span>${data.id}</span></div>
                <div class="meta-item"><span class="meta-label">Model</span><span>${data.model || '?'}</span></div>
                <div class="meta-item"><span class="meta-label">Status</span><span>${data.status}</span></div>
                <div class="meta-item"><span class="meta-label">Date</span><span>${date}</span></div>
                <div class="meta-item"><span class="meta-label">Result</span><span>${data.result || '-'}</span></div>
                <div class="meta-item"><span class="meta-label">Tokens</span><span>${data.tokens_in} in / ${data.tokens_out} out</span></div>
            `;

            const chatContainer = document.getElementById('chat');
            chatContainer.innerHTML = '';

            let logs = [];
            try {
                if (data.logs) {
                    logs = JSON.parse(data.logs);
                }
            } catch (e) {
                // If not JSON, render as single raw block
                chatContainer.innerHTML = `<div class="message-row tool"><div class="message-bubble"><div class="role-badge">RAW LOG</div><pre class="content-block">${escapeHtml(data.logs)}</pre></div></div>`;
                return;
            }

            if (!Array.isArray(logs)) {
                 chatContainer.innerHTML = `<div class="message-row tool"><div class="message-bubble"><div class="role-badge">RAW LOG</div><pre class="content-block">${escapeHtml(JSON.stringify(logs, null, 2))}</pre></div></div>`;
                 return;
            }

            if (logs.length === 0) {
                chatContainer.innerHTML = '<p style="text-align:center">No interaction history found.</p>';
                return;
            }

            logs.forEach(msg => {
                const role = msg.role || 'unknown';
                const parts = msg.parts || [];
                
                let contentHtml = '';
                
                parts.forEach(part => {
                    // Check Part types: text, functionCall, functionResponse
                    // Note: Rust Serialize might use "functionCall" or "function_call" depending on rename_all="camelCase".
                    // src/ai/gemini.rs uses #[serde(rename_all = "camelCase")] for Content/Part/etc.
                    // So keys should be: "text", "functionCall", "functionResponse".
                    
                    if (part.text) {
                        contentHtml += `<div class="text-part">${formatText(part.text)}</div>`;
                    }
                    else if (part.functionCall) {
                        contentHtml += `
                            <div class="fn-call-box">
                                <span class="fn-name">🔧 Call: ${escapeHtml(part.functionCall.name)}</span>
                                ${formatJson(part.functionCall.args, "Arguments")}
                            </div>
                        `;
                    }
                    else if (part.functionResponse) {
                        contentHtml += `
                            <div class="fn-resp-box">
                                <span class="fn-name">✅ Response: ${escapeHtml(part.functionResponse.name)}</span>
                                ${formatJson(part.functionResponse.response, "Return Value")}
                            </div>
                        `;
                    }
                    // Handle snake_case fallbacks just in case (e.g. if DB stored older version)
                    else if (part.function_call) {
                         contentHtml += `
                            <div class="fn-call-box">
                                <span class="fn-name">🔧 Call: ${escapeHtml(part.function_call.name)}</span>
                                ${formatJson(part.function_call.args, "Arguments")}
                            </div>
                        `;
                    }
                    else if (part.function_response) {
                         contentHtml += `
                            <div class="fn-resp-box">
                                <span class="fn-name">✅ Response: ${escapeHtml(part.function_response.name)}</span>
                                ${formatJson(part.function_response.response, "Return Value")}
                            </div>
                        `;
                    }
                });

                const row = document.createElement('div');
                row.className = `message-row ${role}`;
                
                // Friendly role names
                let roleName = role.toUpperCase();
                if (role === 'user') roleName = 'SASHIKO';
                if (role === 'model') roleName = 'LLM';
                if (role === 'function' || role === 'tool') roleName = 'TOOL';

                row.innerHTML = `
                    <div class="message-bubble">
                        <div class="role-badge">${roleName}</div>
                        ${contentHtml}
                    </div>
                `;
                chatContainer.appendChild(row);
            });
        }

        function formatText(text) {
            if (!text) return '';
            const lines = text.split('\n');
            const maxLines = 5;
            
            if (lines.length > maxLines + 2) { // +2 buffer so we don't collapse just 1 extra line
                const preview = lines.slice(0, maxLines).join('\n');
                const rest = lines.slice(maxLines).join('\n');
                
                return `
                    <div class="content-block">${escapeHtml(preview)}</div>
                    <div class="truncated-hint">... ${lines.length - maxLines} lines hidden ...</div>
                    <div class="collapsible">
                        <div class="collapsible-header" onclick="this.parentElement.classList.toggle('open')">
                            Show Full Text <span class="arrow"></span>
                        </div>
                        <div class="collapsible-content">
                            <pre class="content-block">${escapeHtml(text)}</pre>
                        </div>
                    </div>
                `;
            }
            return `<div class="content-block">${escapeHtml(text)}</div>`;
        }

        function formatJson(obj, label) {
            const jsonStr = JSON.stringify(obj, null, 2);
            const lines = jsonStr.split('\n');
            const maxLines = 5;

            // Always use collapsible for JSON if it's multiline? 
            // Or use the same 5-line rule.
            
            if (lines.length > maxLines + 2) {
                 const preview = lines.slice(0, maxLines).join('\n');
                 return `
                    <div class="content-block" style="font-size:0.85em; opacity:0.8;">${escapeHtml(preview)} ... }</div>
                    <div class="collapsible">
                        <div class="collapsible-header" onclick="this.parentElement.classList.toggle('open')">
                            ${label} (Full JSON) <span class="arrow"></span>
                        </div>
                        <div class="collapsible-content">
                            <pre class="content-block">${escapeHtml(jsonStr)}</pre>
                        </div>
                    </div>
                 `;
            } else {
                return `
                    <div style="margin-top:5px; font-weight:bold; font-size:0.8em; color:#555;">${label}:</div>
                    <pre class="content-block" style="background:rgba(255,255,255,0.5); padding:5px; border-radius:3px;">${escapeHtml(jsonStr)}</pre>
                `;
            }
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        fetchLog();
    </script>
</body>
</html>
