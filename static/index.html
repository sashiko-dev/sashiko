<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sashiko</title>
    <style>
        body { font-family: monospace; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f5f5f5; }
        h1 { border-bottom: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #e0e0e0; }
        .status-Pending { color: orange; }
        .status-Applied { color: green; }
        .status-Failed { color: red; }
        .copy-btn { cursor: pointer; border: 1px solid #ccc; background: #fff; padding: 2px 5px; border-radius: 3px; font-size: 12px; }
        .copy-btn:hover { background: #eee; }
    </style>
</head>
<body>
    <h1>Sashiko Patch Tracker</h1>
    <div id="stats">Loading stats...</div>
    <table id="patchsets">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Author</th>
                <th>Date</th>
                <th>Status</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be inserted here -->
        </tbody>
    </table>
    <div id="pagination" style="margin-top: 20px; text-align: center;">
        <button id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
        <span id="pageInfo" style="margin: 0 10px;">Page 1</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
    </div>

    <script>
        let currentPage = 1;
        const perPage = 50;

        async function fetchStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('stats').textContent = `System Status: ${data.status} (v${data.version})`;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Optional: show some feedback
                console.log('Copied to clipboard:', text);
            });
        }

        async function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1) return;
            currentPage = newPage;
            await fetchPatchsets();
        }

        async function fetchPatchsets() {
            const res = await fetch(`/api/patchsets?page=${currentPage}&per_page=${perPage}`);
            const data = await res.json();
            const tbody = document.querySelector('#patchsets tbody');
            tbody.innerHTML = '';
            
            if (data.length === 0 && currentPage > 1) {
                // If current page is empty and we are not on page 1, go back (optional, or just show empty)
                // For now, let's just show empty table but disable Next
                document.getElementById('nextBtn').disabled = true;
            } else {
                document.getElementById('nextBtn').disabled = data.length < perPage;
            }
            
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('pageInfo').textContent = `Page ${currentPage}`;

            data.forEach(p => {
                const row = document.createElement('tr');
                const date = new Date(p.date * 1000).toISOString().split('T')[0];
                row.innerHTML = `
                    <td>${p.subject || '(no subject)'}</td>
                    <td>${p.author || 'unknown'}</td>
                    <td>${date}</td>
                    <td class="status-${p.status}">${p.status || 'Pending'}</td>
                    <td style="text-align: right;"><button class="copy-btn" onclick="copyToClipboard('${p.message_id}')">📋</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        fetchStats();
        fetchPatchsets();
    </script>
</body>
</html>
