# Sashiko Configuration
# Terse comments only. See docs/SETTINGS.md for full details.

log_level = "info"

[project]
name = "Sashiko (Linux Kernel)"
description = "Agentic review system for Linux kernel mailing lists."

[forge]
enabled = false
# provider = "github"
# webhook_secret = "secret"
# api_token = "token"

[subsystems]
# Regex map email -> subsystem name
mapping = [
    { pattern = ".*linux-kernel@vger.kernel.org.*", name = "LKML" },
    { pattern = ".*netdev@vger.kernel.org.*", name = "netdev" },
    { pattern = ".*bpf@vger.kernel.org.*", name = "bpf" },
    { pattern = ".*linux-usb@vger.kernel.org.*", name = "usb" },
    { pattern = ".*linux-fsdevel@vger.kernel.org.*", name = "fsdevel" },
    { pattern = ".*linux-mm@kvack.org.*", name = "linux-mm" }
]

[database]
url = "sashiko.db"
token = ""

[mailing_lists]
# Lore list names to watch
track = ["linux-kernel"]

[nntp]
server = "nntp.lore.kernel.org"
port = 119

[ai]
provider = "gemini"
model = "gemini-3.1-pro-preview"
max_input_tokens = 900000
max_interactions = 50
temperature = 1.0

[ai.claude]
prompt_caching = true

[server]
host = "127.0.0.1"
port = 8080

[git]
# Local path to target repository
repository_path = "third_party/linux"

# Track custom remotes and attempt to apply patches on their branches
# [[git.custom_remotes]]
# name = "remote-name"
# url = "git://my-custom.com/remote"
# check_all_branches = true
# only_branches = []

[review]
concurrency = 20
worktree_dir = "review_trees"
timeout_seconds = 7200
max_retries = 3
ignore_files = ["MAINTAINERS", ".mailmap", ".gitignore", "LICENSES/"]

[tools]
# enabled = ["read_files", "git_diff"]
# disabled = ["TodoWrite"]

[prompts]
# directory = "third_party/prompts/kernel"
# directory = "git://github.com/user/prompts.git"
# stages_config = "stages.toml"

[prompts.variables]
# project_name = "Sashiko"
